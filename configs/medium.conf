NGSimulator {
  seed = 12345
  outputDirectory = "./output"
  NetModel {
    # Medium graph settings for experiments (bigger than small.conf)
    distanceSpreadThreshold = 0.05
    numberOfExperiments = 50
    perturbationCoefficient = 0.3
    dissimulationCoefficient = 0.15
    distanceCoefficient = 0.2
    edgeProbability = 0.005
    statesTotal = 800
    desiredReachabilityCoverage = 1.0
    numberOfWalks = 100
    maxBranchingFactor = 7
    maxDepth = 5
    maxProperties = 20
    propValueRange = 100
    actionType = 20
    actionRange = 10
    connectedness = 4
    maxWalkPathLengthCoeff = 2
    graphWalkTerminationPolicy = ${NGSimulator.Constants.MaxPathLength}
    graphWalkNodeTerminationProbability = 0.001d
    valuableDataProbability = 0.001d
  }
  CostRewards {
    malAppBudget = 2700.0
    costOfDetection = 0.2d
    serviceRewardProbability = 0.3
    serviceReward = 10d
    servicePenalty = 3d
    targetAppScore = 5
    targetAppLowPenalty = 1
    targetAppHighPenalty = 2
  }
  Constants {
    MaxPathLength  = "maxpathlength"
    UntilCycle = "untilcycle"
    All = "all"
  }
  Graph {
    directionality = "directed"
    fileName = "NetGameSimNetGraph_medium.ngs"
    outputPath = "./converted"
    graphLocation = "../../../"
  }
  OutputGraphRepresentation {
    contentType = "json"
  }
}
